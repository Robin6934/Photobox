<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photobooth</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: black; /* Set the background color to black */
            font-family: Arial, sans-serif;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh; /* Make the body take up the full viewport height */
            color: white; /* Set the text color to white */
        }

        h1 {
            font-size: 70px;
            color: white;
            width: 100%;
        }

        a {
            padding: 15px 30px;
            font-size: 50px;
            background-color: #3498db; /* Change to your desired button color */
            border: none;
            color: white;
            cursor: pointer;
            border-radius: 5px;
            transition: background-color 0.3s ease;
            text-decoration: none; /* Remove default underlines for links */
            width: 80%; /* Make the button span 80% of the width, leaving 10% space on each side */
            margin: 10%;
            width: 80%;
        }


    </style>
</head>
<body>
<h1>Take Picture</h1>
<a id="triggerButton" href="javascript:void(0);" th:attr="data-ip-address=${ipAddress}" th:onclick="GetURL(this);">Start Countdown</a>
</body>
<script>
    function GetURL(linkElement) {
        var ipAddress = linkElement.getAttribute('data-ip-address');
        const apiUrl = 'http://' + ipAddress + ':6969/PhotoBoothCommunication/TriggerPicture';
        fetch(apiUrl, { method: 'GET', mode: 'no-cors' })
            .catch(error => {
                // Handle any errors that occurred during the fetch
                console.error('Fetch error:', error);
            });
    }
</script>
</html>
